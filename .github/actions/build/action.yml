name: Build
description: Reusable action to build the app

runs:
  using: 'composite'
  steps:
    - name: Check out Git repository
      uses: actions/checkout@v4

    - name: Install Node and NPM
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci --ignore-scripts
      shell: bash

    - name: Build
      run: npm run build
      shell: bash
