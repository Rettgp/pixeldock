name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read
  issues: write
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lint
        uses: ./.github/actions/lint

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        uses: ./.github/actions/test
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: [lint, test]
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build
        uses: ./.github/actions/build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: release/app/dist/

  publish-release:
    needs: build
    runs-on: windows-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies and postinstall
        run: |
          npm install
          npm run postinstall

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: release/app/dist/

      - name: Publish releases
        shell: pwsh
        env:
          # This is used for uploading release assets to github
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          npm exec -- electron-builder --publish=always --win

  generate-changelog:
    needs: publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout git repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo orhun/git-cliff --pattern "git-cliff-*-x86_64-unknown-linux-musl.tar.gz" --dir /tmp/git-cliff
          tar xzf /tmp/git-cliff/git-cliff-*.tar.gz -C /tmp/git-cliff
          sudo mv /tmp/git-cliff/git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate and update release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git-cliff --config cliff.toml --latest --strip all --output CHANGES.md
          gh release edit "${{ github.ref_name }}" --notes-file CHANGES.md
